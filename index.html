<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Manager Pro</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; }
        .container { display: flex; flex-direction: column; align-items: center; }
        .card { background: #1e293b; padding: 15px; border-radius: 10px; margin: 10px; width: 90%; }
        .market { height: 300px; overflow-y: scroll; border: 2px solid #334155; padding: 10px; }
        button { width: 95%; padding: 10px; margin: 5px; cursor: pointer; border-radius: 5px; border: none; }
    </style>
</head>
<body>
    <h1>⚽ Ultimate Manager Pro</h1>
    <div class="card">
        <h2 id="money">Бюджет: 1000$</h2>
        <p id="stats">З/П: 0$ | Доход: 0$</p>
    </div>
    <button onclick="match()" style="background: #3b82f6; color: white; font-weight: bold;">Сыграть матч (+200$)</button>

    <h3>Трансферный рынок (всего 50 игроков):</h3>
    <div id="market" class="market"></div>

    <script>
        let money = 1000;
        let incomePerSec = 0;
        let salaryPerSec = 0;

        // Генерируем 50 игроков автоматически
        const players = [];
        for (let i = 1; i <= 50; i++) {
            players.push({
                name: `Игрок #${i}`,
                cost: 500 + (i * 100),
                inc: 10 + (i * 5),
                sal: 2 + i
            });
        }

        const marketDiv = document.getElementById("market");
        players.forEach((p, index) => {
            marketDiv.innerHTML += `<button onclick="buyPlayer(${index})" style="background:#ef4444; color:white;">
                ${p.name} (${p.cost}$): +${p.inc}$/сек (З/П ${p.sal}$)</button>`;
        });

        function buyPlayer(index) {
            let p = players[index];
            if (money >= p.cost) {
                money -= p.cost;
                incomePerSec += p.inc;
                salaryPerSec += p.sal;
            } else { alert("Недостаточно денег!"); }
        }

        setInterval(() => {
            money += (incomePerSec - salaryPerSec);
            if (money <= 0) { alert("Банкротство!"); location.reload(); }
            document.getElementById("money").innerHTML = `Бюджет: ${Math.floor(money)}$`;
            document.getElementById("stats").innerHTML = `З/П: ${salaryPerSec}$/сек | Доход: ${incomePerSec}$/сек`;
        }, 1000);

        function match() { money += 200; }
    </script>
</body>
</html>
